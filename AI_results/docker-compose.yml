version: '3.9'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
      POSTGRES_DB: todo_db
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    ports:
      - "3001:3000"
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
